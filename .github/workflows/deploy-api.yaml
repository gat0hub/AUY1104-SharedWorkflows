name: Deploy API a K3s (Blue-Green Simplificado)

on:
  workflow_call:
    inputs:
      image-name:
        description: Nombre de la imagen en Docker Hub
        required: true
        type: string
      image-tag:
        description: Etiqueta (versión) de la imagen
        required: true
        type: string
      k3s-server-public-ip:
        description: IP pública del servidor K3s
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      EA2_SSH_PRIVATE_KEY:
        required: true

jobs:
  deps-and-test:
    name: Dependencies and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npm test

  build-and-push:
    name: Build and push Docker image
    needs: deps-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push
        env:
          IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}
        run: |
          docker build -t "${IMAGE_REPO}:${{ inputs.image-tag }}" -t "${IMAGE_REPO}:latest" .
          docker push --all-tags "${IMAGE_REPO}"

  deploy-to-k8s:
    name: Deploy to K3s (Blue-Green)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 1 · Traer código del repositorio
        uses: actions/checkout@v4

      - name: 2 · Configurar llave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EA2_SSH_PRIVATE_KEY }}

      - name: 3 · Identificar versión activa (Blue o Green)
        id: slot
        run: |
          # Lee qué versión está usando el Service ahora mismo. Si no existe, asume 'blue' por defecto.
          CURRENT_SLOT=$(ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} "sudo k3s kubectl get service demo-api -o jsonpath='{.spec.selector.version}' 2>/dev/null || echo 'blue'")
          
          if [ "$CURRENT_SLOT" == "blue" ]; then
            TARGET_SLOT="green"
          else
            TARGET_SLOT="blue"
          fi
          
          echo "current=$CURRENT_SLOT" >> $GITHUB_OUTPUT
          echo "target=$TARGET_SLOT" >> $GITHUB_OUTPUT
          echo "Activo: $CURRENT_SLOT | Desplegando en: $TARGET_SLOT"

      - name: 4 · Reemplazar variables en los YAML locales
        env:
          APP_NAME: demo-api
          SLOT: ${{ steps.slot.outputs.target }}
          IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
        run: |
          mkdir -p k8s-ready
          # envsubst es mucho más limpio que el comando perl del código anterior
          for file in k8s/*.yaml; do
            envsubst < "$file" > "k8s-ready/$(basename "$file")"
          done

      - name: 5 · Aplicar Service base y Nuevo Deployment
        run: |
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} 'rm -rf /tmp/k8s && mkdir -p /tmp/k8s'
          scp -o StrictHostKeyChecking=accept-new k8s-ready/*.yaml ubuntu@${{ inputs.k3s-server-public-ip }}:/tmp/k8s/
          
          # Aplicamos el Service base (si no existe) y el Deployment de la nueva versión
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} \
            "sudo k3s kubectl apply -f /tmp/k8s/service.yaml && \
             sudo k3s kubectl apply -f /tmp/k8s/deployment.yaml"
             
      - name: 6 · Esperar que la nueva versión esté saludable
        run: |
          # Kubernetes validará los readinessProbes aquí. Si fallan, este comando se rompe y salta al Rollback.
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} \
            "sudo k3s kubectl rollout status deployment/demo-api-${{ steps.slot.outputs.target }} --timeout=60s"

      - name: 7 · Cambiar el tráfico al nuevo color (Switch)
        run: |
          # Solo se ejecuta si el paso 6 fue exitoso. Redirige el tráfico de los usuarios.
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} \
            "sudo k3s kubectl patch service demo-api -p '{\"spec\":{\"selector\":{\"version\":\"${{ steps.slot.outputs.target }}\"}}}'"
          echo "¡Tráfico redirigido exitosamente a la versión ${{ steps.slot.outputs.target }}!"

      - name: 8 · Rollback Automático (Solo si falla)
        if: failure()
        run: |
          echo "¡Fallo detectado! Manteniendo el servicio en la versión anterior (${{ steps.slot.outputs.current }})."
          # Nos aseguramos de que el Service apunte al color que ya funcionaba
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} \
            "sudo k3s kubectl patch service demo-api -p '{\"spec\":{\"selector\":{\"version\":\"${{ steps.slot.outputs.current }}\"}}}' || true"
          # Borramos la versión rota
          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ inputs.k3s-server-public-ip }} \
            "sudo k3s kubectl delete deployment demo-api-${{ steps.slot.outputs.target }} --ignore-not-found=true"
